<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confirmation virement - Destination Cote Basque</title>
  <style>
    :root {
      --gold: #CC9933;
      --green: #9EB39A;
      --red: #DC2626;
      --paper: #F5F0E8;
      --text: #2C2416;
      --muted: #6B5843;
      --line: #E1D6C5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--paper);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    .panel {
      width: min(480px, 100%);
      padding: 44px 36px 32px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(44, 36, 22, 0.10);
    }
    .mark {
      width: 56px;
      height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      border-radius: 50%;
      background: rgba(158, 179, 154, 0.18);
      color: var(--green);
      font-size: 32px;
      font-weight: 700;
    }
    .panel.error .mark {
      background: rgba(220, 38, 38, 0.10);
      color: var(--red);
    }
    .brand {
      margin-bottom: 12px;
      color: #9C8E7D;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 16px;
      color: var(--gold);
      font-size: 22px;
      line-height: 1.25;
    }
    .panel.error h1 { color: var(--red); }
    p {
      margin: 0 0 30px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .footer {
      border-top: 2px solid var(--gold);
      padding-top: 20px;
      color: #9C8E7D;
      font-size: 11px;
      line-height: 1.5;
    }
    .panel.error .footer { border-top-color: var(--red); }
  </style>
</head>
<body>
  <main class="panel" id="panel">
    <div class="mark" id="mark">&#10003;</div>
    <div class="brand">Destination C&ocirc;te Basque</div>
    <h1 id="title">Virement confirm&eacute;</h1>
    <p id="message">Merci, votre virement a bien &eacute;t&eacute; enregistr&eacute;. Destination C&ocirc;te Basque en a &eacute;t&eacute; inform&eacute;e.</p>
    <div class="footer">Destination C&ocirc;te Basque SARL &middot; RCS Bayonne 904 781 671</div>
  </main>
  <script>
    const states = {
      ok: {
        title: 'Virement confirm\u00e9',
        message: 'Merci, votre virement a bien \u00e9t\u00e9 enregistr\u00e9. Destination C\u00f4te Basque en a \u00e9t\u00e9 inform\u00e9e.',
        icon: '\u2713',
      },
      already: {
        title: 'D\u00e9j\u00e0 confirm\u00e9',
        message: 'Ce virement a d\u00e9j\u00e0 \u00e9t\u00e9 enregistr\u00e9. Merci.',
        icon: '\u2713',
      },
      expired: {
        title: 'Lien expir\u00e9',
        message: 'Ce lien de confirmation a expir\u00e9 ou est invalide. Contactez Destination C\u00f4te Basque si vous avez effectu\u00e9 le virement.',
        icon: '!',
        error: true,
      },
      invalid: {
        title: 'Lien invalide',
        message: 'Ce lien de confirmation est invalide ou incomplet.',
        icon: '!',
        error: true,
      },
      'not-found': {
        title: 'Facture introuvable',
        message: 'Ce lien ne correspond \u00e0 aucune facture. Contactez Destination C\u00f4te Basque.',
        icon: '!',
        error: true,
      },
      config: {
        title: 'Erreur technique',
        message: 'La confirmation ne peut pas \u00eatre enregistr\u00e9e pour le moment. Contactez Destination C\u00f4te Basque.',
        icon: '!',
        error: true,
      },
      error: {
        title: 'Erreur technique',
        message: 'La confirmation ne peut pas \u00eatre enregistr\u00e9e pour le moment. Contactez Destination C\u00f4te Basque.',
        icon: '!',
        error: true,
      },
    }

    const status = new URLSearchParams(window.location.search).get('status') || 'ok'
    const state = states[status] || states.ok
    const panel = document.getElementById('panel')
    document.getElementById('title').textContent = state.title
    document.getElementById('message').textContent = state.message
    document.getElementById('mark').textContent = state.icon
    if (state.error) panel.classList.add('error')
  </script>
</body>
</html>
